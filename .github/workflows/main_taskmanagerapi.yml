name: Build and deploy ASP.Net Core app to Azure Web App - TaskManagerAPI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout your repository
      - uses: actions/checkout@v4

      # Step 2: Setup .NET SDK
      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      # Step 3: Restore dependencies
      - name: Restore dependencies
        run: dotnet restore TaskManagerApplication.sln

      # Step 4: Build solution
      - name: Build solution
        run: dotnet build TaskManagerApplication.sln --configuration Release --no-restore

      # Step 5: Publish the project (important: target the .csproj file)
      - name: Publish project
        run: dotnet publish TaskManagerApplication/TaskManagerApplication.csproj --configuration Release --output publish_output

      # Step 6: Upload artifact for deployment
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: publish_output

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      # Step 1: Download the published artifact
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app

      # Step 2: Login to Azure using a Service Principal
      - name: Login to Azure
        uses: azure/login@v2
        with:
          auth-type: 'service-principal'
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          client-secret: ${{ secrets.AZUREAPPSERVICE_CLIENTSECRET }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      # Step 3: Deploy to Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'TaskManagerAPI'       # Make sure this matches your Azure App Service name
          slot-name: 'Production'          # Use a slot if you have one, otherwise 'Production'
          package: publish_output          # Path to your published files
