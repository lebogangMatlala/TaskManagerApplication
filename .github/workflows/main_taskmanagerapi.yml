name: Build and deploy ASP.Net Core app to Azure Web App - TaskManagerAPI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # needed for OIDC login

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup .NET 8 SDK
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      # 3️⃣ Restore dependencies
      - name: Restore dependencies
        run: dotnet restore TaskManagerApplication.sln

      # 4️⃣ Build solution
      - name: Build solution
        run: dotnet build TaskManagerApplication.sln --configuration Release --no-restore

      # 5️⃣ Publish project
      - name: Publish project
        run: dotnet publish TaskManagerApplication.sln --configuration Release --output publish_output

      # 6️⃣ Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: publish_output

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      # 1️⃣ Download artifact from build job
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app
          path: ./publish

      # 2️⃣ Login to Azure using OIDC
      - name: Login to Azure
        uses: azure/login@v2
        with:
          auth-type: 'oidc'
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      # 3️⃣ Deploy to Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'TaskManagerAPI'
          slot-name: 'Production'
          package: ./publish
