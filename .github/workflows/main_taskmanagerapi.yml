name: Build and Deploy ASP.Net Core App - TaskManagerAPI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      # Restore dependencies
      - name: Restore dependencies
        run: dotnet restore TaskManagerApplication/TaskManagerApplication.csproj

      # Build project
      - name: Build
        run: dotnet build TaskManagerApplication/TaskManagerApplication.csproj --configuration Release --no-restore

      # Publish project
      - name: Publish
        run: dotnet publish TaskManagerApplication/TaskManagerApplication.csproj -c Release -o ./publish

      # Upload artifact for deployment
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: taskmanagerapi
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      # Checkout (needed for GitHub Actions workspace)
      - uses: actions/checkout@v4

      # Download the published artifact
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: taskmanagerapi
          path: ./publish

      # Login to Azure
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      # Deploy to Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'TaskManagerAPI'      # your Azure App Service name
          slot-name: 'Production'         # optional if you use slots
          package: ./publish
