name: Build and deploy ASP.Net Core app to Azure Web App - TaskManagerAPI
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Checkout code
      - uses: actions/checkout@v4

      # Setup .NET SDK
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      # Restore dependencies
      - run: dotnet restore TaskManagerApplication.sln

      # Build solution
      - run: dotnet build TaskManagerApplication.sln --configuration Release --no-restore

      # Publish project
      - run: dotnet publish TaskManagerApplication.sln --configuration Release --output publish_output

      # Upload artifact
      - uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: publish_output

      # Login to Azure using your four secrets
      - uses: azure/login@v2
        with:
          auth-type: 'service-principal'
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}
          client-secret: ${{ secrets.AZUREAPPSERVICE_CLIENTSECRET }}

      # Optional: test login
      - uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az account show

      # Deploy to Azure Web App
      - uses: azure/webapps-deploy@v3
        with:
          app-name: 'TaskManagerAPI'
          slot-name: 'Production'
          package: publish_output
